#:schema node_modules/wrangler/config-schema.json

name = "hackertrip"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Workers Paid plan is required for this
# workers_dev = true

# R2 Bucket 绑定
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "hackertrip"

# 环境变量 (敏感信息通过 wrangler secret 设置)
[vars]
# 非敏感配置
AUTH_URL = "https://hackertrip.com"

# 定时任务 (Cron Triggers) - 替代 node-cron
# 示例：每天凌晨 2 点运行爬虫
# [triggers]
# crons = ["0 2 * * *"]

# 资源限制
[limits]
cpu_ms = 30000

# 预览环境
[env.preview]
name = "hackertrip-preview"

[[env.preview.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "hackertrip-preview"
